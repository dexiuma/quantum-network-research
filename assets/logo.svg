<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="qng" x1="6" y1="40" x2="42" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- entangled-photon link: a wave travelling between two network nodes -->
  <path d="M13.5 33.5 C 18 29, 20 32.5, 24 27.5 S 30.5 19.5, 34.5 14.5"
        stroke="url(#qng)" stroke-width="3" stroke-linecap="round"/>
  <!-- node A (bottom-left) -->
  <circle cx="10.5" cy="37.5" r="4.5" stroke="url(#qng)" stroke-width="3"/>
  <!-- node B (top-right) -->
  <circle cx="37.5" cy="10.5" r="4.5" stroke="url(#qng)" stroke-width="3"/>
  <!-- calibration orbit around node B: the "grounded in real hardware" ring -->
  <ellipse cx="37.5" cy="10.5" rx="9.5" ry="4.2" stroke="#a78bfa" stroke-width="1.4"
           opacity="0.55" transform="rotate(-32 37.5 10.5)"/>
  <!-- data qubit in flight -->
  <circle cx="24" cy="27.5" r="2.3" fill="#38bdf8"/>
</svg>
